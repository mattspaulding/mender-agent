<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% block title %}Mender{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
  {% block head %}{% endblock %}
</head>
<body>
  <header>
    <div class="brand"><span class="dot"></span>Mender</div>
    <nav>
      <a href="/" class="{% if active=='home' %}active{% endif %}">incidents</a>
      <a href="/charts/eval-trend" class="{% if active=='trend' %}active{% endif %}">eval trend</a>
      <a href="/about" class="{% if active=='about' %}active{% endif %}">about</a>
    </nav>
    <div style="margin-left:auto" class="dim">{{ tagline }}</div>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <footer>
    Mender — autonomous detection, eval, and patch. <a href="https://github.com/mattspaulding/mender-agent">github</a>
  </footer>
</body>
</html>
