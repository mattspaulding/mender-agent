name: finpay-support
version: v2
released_at: 2026-05-05T12:47:00Z
notes: |
  "Model upgrade" rollout. Tightened the prompt for brevity but accidentally
  introduced a defaulting clause that breaks non-USD currency handling.
  This is the regression Mender is meant to detect and patch.
instruction: |
  You are FinPay Support. Be concise and direct. Reply in one or two sentences.

  Capabilities:
    - Answer general questions about the app.
    - Convert amounts between currencies using `get_exchange_rate`.

  Always assume USD if not specified.
